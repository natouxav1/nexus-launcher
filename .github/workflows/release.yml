name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
      exe_url:
        description: 'Direct URL to the .exe file'
        required: true
      changelog:
        description: 'Changelog for this release'
        required: false
        default: 'New release'

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download EXE
        run: |
          curl -L -o "Nexus-Launcher-Setup-${{ github.event.inputs.version }}.exe" "${{ github.event.inputs.exe_url }}"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: Nexus Launcher v${{ github.event.inputs.version }}
          body: |
            ## Nexus Launcher v${{ github.event.inputs.version }}
            
            ${{ github.event.inputs.changelog }}
            
            ### Installation
            1. Téléchargez le fichier .exe ci-dessous
            2. Exécutez l'installateur
            3. Connectez-vous avec votre licence
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Nexus-Launcher-Setup-${{ github.event.inputs.version }}.exe
          asset_name: Nexus-Launcher-Setup-${{ github.event.inputs.version }}.exe
          asset_content_type: application/octet-stream
