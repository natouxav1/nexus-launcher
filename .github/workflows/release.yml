name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Déclenché sur les tags de version (ex: v1.0.0)

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Find installer
        id: find_installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $exePath = Get-ChildItem -Path "release/$version" -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exePath) {
            echo "EXE_PATH=$($exePath.FullName)" >> $env:GITHUB_OUTPUT
            echo "EXE_NAME=$($exePath.Name)" >> $env:GITHUB_OUTPUT
          } else {
            echo "No .exe file found!"
            exit 1
          }

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Nexus Launcher ${{ github.ref_name }}
            
            ### Installation
            1. Téléchargez le fichier .exe ci-dessous
            2. Exécutez l'installateur
            3. Suivez les instructions
            
            ### Changelog
            - Voir les commits pour les détails des changements
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_installer.outputs.EXE_PATH }}
          asset_name: ${{ steps.find_installer.outputs.EXE_NAME }}
          asset_content_type: application/octet-stream
