<VirtualHost *:80>
    ServerName api.nexus-mod.com
    ServerAlias api2.nexus-mod.com
    Redirect permanent / https://api.nexus-mod.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName api.nexus-mod.com
    ServerAlias api2.nexus-mod.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/nexus-mod.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/nexus-mod.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    ErrorLog ${APACHE_LOG_DIR}/api_nexus_error.log
    CustomLog ${APACHE_LOG_DIR}/api_nexus_access.log combined
</VirtualHost>
